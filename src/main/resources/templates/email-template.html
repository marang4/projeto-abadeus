<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperação de Senha - Logan Express</title>
    <style>
        body { margin: 0; padding: 0; background-color: #020617; font-family: 'Segoe UI', Arial, sans-serif; color: #ffffff; }
        .wrapper { width: 100%; table-layout: fixed; background-color: #020617; padding-bottom: 40px; }
        .main { background-color: #0f172a; width: 100%; max-width: 600px; margin: 40px auto; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .header { background-color: #0f172a; padding: 40px 20px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .header h1 { color: #ffffff; margin: 0; font-size: 26px; font-weight: 800; letter-spacing: -1px; }
        .orange-text { color: #ff5722; }
        .content { padding: 40px 30px; text-align: center; line-height: 1.6; }
        .content p { color: #94a3b8; font-size: 16px; margin-bottom: 25px; }
        .button-cta { background-color: #ff5722; color: #ffffff !important; padding: 16px 32px; text-decoration: none; border-radius: 12px; font-weight: 700; display: inline-block; box-shadow: 0 10px 20px rgba(255, 87, 34, 0.2); }
        .link-alt { margin-top: 30px; font-size: 12px; color: #64748b; word-break: break-all; }
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #475569; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="main">
        <div class="header">
            <h1>LOGAN <span class="orange-text">EXPRESS</span></h1>
        </div>
        <div class="content">
            <h2 style="color: #ffffff; margin-bottom: 20px;">Recuperação de Senha</h2>
            <p>Recebemos uma solicitação para redefinir a senha da sua conta. Se você não solicitou isso, pode ignorar este e-mail.</p>

            <div style="margin: 40px 0;">
                <a href="${link}" class="button-cta">REDEFINIR SENHA</a>
            </div>

            <p class="link-alt">O link expirará em breve. Caso o botão falhe, utilize o endereço abaixo: <br>
                <a href="${link}" style="color: #ff5722;">${link}</a>
            </p>
        </div>
        <div class="footer">
            © 2026 Logan Express - Logística Inteligente
        </div>
    </div>
</div>
</body>
</html>

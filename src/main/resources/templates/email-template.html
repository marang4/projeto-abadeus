<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperação de Senha - Abadeus Eventos</title>
    <style>
        body { margin: 0; padding: 0; background-color: #060720; font-family: 'Segoe UI', Arial, sans-serif; color: #424242; }
        .wrapper { width: 100%; table-layout: fixed; background-color: #060720; padding-bottom: 40px; }
        .main { background-color: #ffffff; width: 100%; max-width: 600px; margin: 40px auto; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .header { background-color: #ffffff; padding: 40px 20px; text-align: center; border-bottom: 1px solid #f0f0f0; }
        .header h1 { color: #424242; margin: 0; font-size: 26px; font-weight: 800; letter-spacing: -1px; text-transform: uppercase; }
        .orange-text { color: #F1A139; text-transform: none; }
        .content { padding: 40px 30px; text-align: center; line-height: 1.6; }
        .content h2 { color: #424242; margin-bottom: 20px; }
        .content p { color: #666666; font-size: 16px; margin-bottom: 25px; }
        .button-cta { background-color: #3B7EA6; color: #ffffff !important; padding: 16px 32px; text-decoration: none; border-radius: 12px; font-weight: 700; display: inline-block; box-shadow: 0 10px 20px rgba(59, 126, 166, 0.3); transition: background-color 0.3s; }
        .button-cta:hover { background-color: #2e6284; }
        .link-alt { margin-top: 30px; font-size: 12px; color: #888888; word-break: break-all; }
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #888888; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="main">
        <div class="header">
            <h1>ABADEUS <span class="orange-text">EVENTOS</span>
        </div>
        <div class="content">
            <h2>Recuperação de Senha</h2>
            <p>Recebemos uma solicitação para redefinir a senha da sua conta. Se você não solicitou isso, pode ignorar este e-mail.</p>

            <div style="margin: 40px 0;">
                <a href="${link}" class="button-cta">REDEFINIR SENHA</a>
            </div>

            <p class="link-alt">O link expirará em breve. Caso o botão falhe, utilize o endereço abaixo: <br>
                <a href="${link}" style="color: #3B7EA6;">${link}</a>
            </p>
        </div>
        <div class="footer">
            © 2026 Abadeus Eventos
        </div>
    </div>
</div>
</body>
</html>
